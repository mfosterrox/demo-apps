apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: juice-shop
  labels:
    app: juice-shop
    demo: roadshow
    repo: demo-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
        demo: roadshow
        repo: demo-apps
    spec:
      initContainers:
        - name: setup-permissions
          image: busybox:latest
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /well-known/csaf
              chown -R 65532:0 /well-known
              chmod -R 775 /well-known
              ls -la /well-known || true
          volumeMounts:
            - name: well-known-data
              mountPath: /well-known
          securityContext:
            runAsUser: 0
      containers:
        - name: juice-shop
          image: bkimminich/juice-shop
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            fsGroup: 0
          env:
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: well-known-data
              mountPath: /juice-shop/.well-known
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: well-known-data
          emptyDir: {}

