apiVersion: v1
kind: Namespace
metadata:
  name: ctf-web-to-system
---
apiVersion: v1
kind: Service
metadata:
  name: ctf-web-to-system-service
  namespace: ctf-web-to-system
spec:
  selector:
    app: ctf-web-to-system
  ports:
    - protocol: TCP
      port: 80 
      targetPort: 9090  
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctf-web-to-system
  namespace: ctf-web-to-system
  labels:
    app: ctf-web-to-system
    demo: roadshow
  annotation:
    app: ctf-web-to-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ctf-web-to-system
  template:
    metadata:
      labels:
        app: ctf-web-to-system
    spec:
      containers:
      - name: ctf-web-container
        image: quay.io/mfoster/ctf-web-to-system:0.2.1
        ports:
        - containerPort: 9090
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ctf-web-to-system
  namespace: ctf-web-to-system
  labels:
    app: ctf-web-to-system
spec:
  to:
    kind: Service
    name: ctf-web-to-system-service
  port:
    targetPort: 80
  tls:
    termination: edge
  wildcardPolicy: None